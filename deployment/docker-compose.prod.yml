version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: socialpulse_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ../.env
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: socialpulse_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1

  mongodb:
    image: mongo:7.0
    container_name: socialpulse_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: socialpulse_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
